<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <title>Sodda LMS</title>
</head>
<body>
    <h1>LMS Boshqaruv Paneli</h1>
    
    <section>
        <h3>Kurs qo'shish</h3>
        <form action="/add_course" method="post">
            <input type="text" name="name" placeholder="Kurs nomi" required>
            <button type="submit">Qo'shish</button>
        </form>
    </section>

    <section>
        <h3>Talaba qo'shish</h3>
        <form action="/add_student" method="post">
            <input type="text" name="name" placeholder="Talaba ismi" required>
            <select name="course_id" required>
                {% for course in courses %}
                <option value="{{ course['id'] }}">{{ course['name'] }}</option>
                {% endfor %}
            </select>
            <button type="submit">Qo'shish</button>
        </form>
    </section>

    <section>
        <h3>Talabalar ro'yxati</h3>
        <table border="1">
            <tr>
                <th>Talaba</th>
                <th>Kurs</th>
            </tr>
            {% for student in students %}
            <tr>
                <td>{{ student['student_name'] }}</td>
                <td>{{ student['course_name'] }}</td>
            </tr>
            {% endfor %}
        </table>
    </section>
</body>
</html>
